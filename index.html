        (function() { emailjs.init("kvEuwT7TlqEEW3-lg"); })();

        document.getElementById('contactForm').addEventListener('submit', function(e) {

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: `🔔 New!\n${name}\n${email}\n${message}` })
